name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload dist artifact
        if: env.ACTIONS_RUNTIME_TOKEN != ''
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist
          retention-days: 1

  e2e:
    name: E2E tests
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ${{ github.workspace }}/.pw-browsers
          key: playwright-chromium-${{ hashFiles('app/package-lock.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: app/dist
          key: build-${{ github.sha }}
          restore-keys: build-

      - name: Build for preview
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure() && env.ACTIONS_RUNTIME_TOKEN != ''
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
